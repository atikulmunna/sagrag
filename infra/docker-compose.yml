services:

  qdrant:
    image: qdrant/qdrant:v1.16.1
    container_name: infra-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"

  elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: infra-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  neo4j:
    image: neo4j:5.13
    container_name: infra-neo4j
    environment:
      - NEO4J_AUTH=neo4j/mysecurepassword
    ports:
      - "7474:7474"
      - "7687:7687"

  redis:
    image: redis:7
    container_name: infra-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: backend.Dockerfile
    container_name: sag-backend
    env_file:
      - ../.env
    volumes:
      - ../app:/app
      - ../data:/data
      - ${HF_CACHE_DIR:-./hf_cache}:/root/.cache/huggingface
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
      - elastic
      - neo4j
      - redis

  gradio:
    build:
      context: ..
      dockerfile: ui.Dockerfile
    container_name: sag-gradio
    environment:
      - SAG_RAG_API_BASE=http://backend:8000
      - SAG_RAG_UI_TIMEOUT_S=90
    ports:
      - "7860:7860"
    depends_on:
      - backend

  # Observability stack — opt-in via: docker compose --profile observability up
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sag-prometheus
    profiles: ["observability"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    container_name: sag-grafana
    profiles: ["observability"]
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: sag-otel-collector
    profiles: ["observability"]
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
